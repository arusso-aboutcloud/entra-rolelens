name: Sentrux Quality Gate

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get baseline from master
        run: |
          mkdir -p .sentrux
          git show origin/master:.sentrux/baseline.json > .sentrux/baseline.json 2>/dev/null || \
            echo '{"quality_signal": 0, "coupling_score": 0, "cycle_count": 0, "god_file_count": 0}' > .sentrux/baseline.json
          echo "Baseline loaded:"
          cat .sentrux/baseline.json

      - name: Download Sentrux
        run: |
          curl -L -o sentrux https://github.com/sentrux/sentrux/releases/download/v0.5.7/sentrux-linux-x86_64
          chmod +x sentrux
          SIZE=$(stat -c%s sentrux)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: sentrux binary is $SIZE bytes (expected ~36MB)"
            exit 1
          fi

      - name: Run Sentrux gate
        id: gate
        run: |
          # Sentrux gate exits non-zero on regression (uses built-in tolerance).
          # We trust its verdict for the quality score; we additionally enforce
          # zero-tolerance on cycles and god files.
          SENTRUX_EXIT=0
          ./sentrux gate . > .sentrux/gate_stdout.txt 2> .sentrux/gate_stderr.txt || SENTRUX_EXIT=$?
          export SENTRUX_EXIT

          python pipeline/sentrux_parser.py

          echo "Gate output:"
          cat .sentrux/gate_stdout.txt
          echo "---"
          echo "Parsed quality:"
          cat .sentrux/quality.json

          # Check for architectural red flags (zero-tolerance on new cycles/god files)
          python3 << 'PYEOF'
          import json, os, sys
          with open(".sentrux/quality.json") as f:
              q = json.load(f)

          cur_cycles = q.get("cycles_current", 0) or 0
          base_cycles = q.get("cycles_baseline", 0) or 0
          cur_god = q.get("god_files_current", 0) or 0
          base_god = q.get("god_files_baseline", 0) or 0
          verdict = q.get("verdict", "unknown")

          print(f"  Verdict:         {verdict}")
          print(f"  Cycles:          {base_cycles} -> {cur_cycles}")
          print(f"  God files:       {base_god} -> {cur_god}")

          arch_fail = False
          if cur_cycles > base_cycles and cur_cycles > 0:
              print(f"  ❌ New cycles detected: {base_cycles} -> {cur_cycles}")
              arch_fail = True
          if cur_god > base_god and cur_god > 0:
              print(f"  ❌ New god files detected: {base_god} -> {cur_god}")
              arch_fail = True

          sentrux_exit = int(os.environ.get("SENTRUX_EXIT", 0))
          print(f"  Sentrux exit:    {sentrux_exit}")
          if arch_fail:
              print("  ❌ Architectural regression — block merge")
              sys.exit(1)
          elif sentrux_exit != 0:
              print("  ❌ Sentrux gate failed — block merge")
              sys.exit(1)
          else:
              print("  ✓ Quality gate passed")
          PYEOF
