name: Update README on Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Version label (e.g. v1.2.0) — leave blank to auto-detect'
        required: false
        default: ''
      ai_engine:
        description: 'AI engine override: github | anthropic | openai (blank = repo variable)'
        required: false
        default: ''

permissions:
  contents: write
  models: read        # required for GitHub Models API (GITHUB_TOKEN auth)

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Resolve version ─────────────────────────────────────────────────
      - name: Resolve version label
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_label }}" ]; then
            VERSION="${{ github.event.inputs.version_label }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF##*/}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # ── 3. Resolve AI engine ───────────────────────────────────────────────
      # Priority: manual input > repo variable README_AI_ENGINE > default (github)
      # Set repo variable at: Settings → Variables → Actions → README_AI_ENGINE
      - name: Resolve AI engine
        id: engine
        run: |
          MANUAL="${{ github.event.inputs.ai_engine }}"
          REPO_VAR="${{ vars.README_AI_ENGINE }}"
          ENGINE="${MANUAL:-${REPO_VAR:-github}}"
          ENGINE=$(echo "$ENGINE" | tr '[:upper:]' '[:lower:]')
          echo "ENGINE=$ENGINE" >> "$GITHUB_OUTPUT"
          echo "Using AI engine: $ENGINE"

      # ── 4. Fetch live stats ────────────────────────────────────────────────
      - name: Fetch live stats from Worker API
        id: stats
        run: |
          WORKER_URL="https://rolelens-worker.russo-antonio76.workers.dev/api/status"
          RESPONSE=$(curl -sf "$WORKER_URL" || echo '{}')
          ROLE_COUNT=$(echo "$RESPONSE"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('role_count','?'))"        2>/dev/null || echo "?")
          TASK_COUNT=$(echo "$RESPONSE"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('task_count','?'))"        2>/dev/null || echo "?")
          SHADOW_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('shadow_role_count','?'))" 2>/dev/null || echo "?")
          echo "ROLE_COUNT=$ROLE_COUNT"     >> "$GITHUB_OUTPUT"
          echo "TASK_COUNT=$TASK_COUNT"     >> "$GITHUB_OUTPUT"
          echo "SHADOW_COUNT=$SHADOW_COUNT" >> "$GITHUB_OUTPUT"
          echo "Stats → roles=$ROLE_COUNT  tasks=$TASK_COUNT  shadow=$SHADOW_COUNT"

      # ── 5. Collect code context ────────────────────────────────────────────
      - name: Collect code context for AI
        run: |
          head -120 worker/src/index.ts 2>/dev/null > /tmp/worker_snippet.txt || echo "not found" > /tmp/worker_snippet.txt

          PIPELINE_SUMMARY=""
          for f in pipeline/*.py; do
            SCRIPT=$(basename "$f")
            DOCLINE=$(grep -m1 '"""' "$f" | tr -d '"' | xargs 2>/dev/null || head -2 "$f" | tail -1 | tr -d '#' | xargs)
            PIPELINE_SUMMARY="${PIPELINE_SUMMARY}\n- ${SCRIPT}: ${DOCLINE}"
          done
          printf "$PIPELINE_SUMMARY" > /tmp/pipeline_summary.txt

          git log --oneline --no-merges -20 \
            --invert-grep --grep="\[skip ci\]" \
            --pretty=format:"- %s (%ad)" --date=short 2>/dev/null | head -15 > /tmp/git_log.txt

          echo "Context files written."

      # ── 6. Generate README sections (engine-aware) ─────────────────────────
      - name: Generate updated README sections
        env:
          ENGINE:            ${{ steps.engine.outputs.ENGINE }}
          # GitHub Models — uses GITHUB_TOKEN (no extra secret needed)
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          # Optional: only needed if you select these engines
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERSION:           ${{ steps.version.outputs.VERSION }}
          ROLE_COUNT:        ${{ steps.stats.outputs.ROLE_COUNT }}
          TASK_COUNT:        ${{ steps.stats.outputs.TASK_COUNT }}
          SHADOW_COUNT:      ${{ steps.stats.outputs.SHADOW_COUNT }}
        run: |
          pip install openai anthropic --quiet

          python3 << 'PYEOF'
          import os, datetime

          engine       = os.environ.get("ENGINE", "github")
          version      = os.environ.get("VERSION", "unknown")
          role_count   = os.environ.get("ROLE_COUNT", "?")
          task_count   = os.environ.get("TASK_COUNT", "?")
          shadow_count = os.environ.get("SHADOW_COUNT", "?")
          release_date = datetime.date.today().isoformat()

          worker_snippet   = open("/tmp/worker_snippet.txt").read()[:3000]
          pipeline_summary = open("/tmp/pipeline_summary.txt").read()[:1500]
          git_log          = open("/tmp/git_log.txt").read()[:1500]
          readme           = open("README.md").read()

          prompt = f"""You are a technical writer maintaining the README for Entra RoleLens.
The project is a zero-cost Cloudflare-hosted tool that maps Entra ID tasks to minimum
built-in roles, detects shadow/unlisted roles, and keeps data fresh via a nightly
passwordless OIDC pipeline.

## Current live stats (from Worker /api/status)
- Roles: {role_count}
- Tasks: {task_count}
- Shadow (unlisted) roles: {shadow_count}

## Release being documented
Version: {version}
Date: {release_date}

## Recent commits (non-data)
{git_log}

## Worker routes (index.ts, first 120 lines)
{worker_snippet}

## Pipeline scripts
{pipeline_summary}

## Current README (context only — do NOT reproduce in full)
{readme[:8000]}

---

Your tasks:

1. **WHATS_NEW block** — Write 3–6 bullet points summarising what changed in this
   release. Base them on the git log. Each bullet: one line, starts with a verb,
   no filler. Wrap in:
   <!-- WHATS_NEW_START -->
   ...bullets...
   <!-- WHATS_NEW_END -->

2. **Data quality block** — Rewrite the "Data quality" section bullets using the
   live stats above to replace hardcoded numbers. Keep the same 5-bullet structure.
   Wrap in:
   <!-- DATA_QUALITY_START -->
   ...bullets...
   <!-- DATA_QUALITY_END -->

Return BOTH blocks and nothing else."""

          # ── GitHub Models (free, GITHUB_TOKEN, no extra secret) ─────────────
          if engine == "github":
              from openai import OpenAI   # GitHub Models is OpenAI-SDK compatible
              client = OpenAI(
                  base_url="https://models.github.ai/inference",
                  api_key=os.environ["GITHUB_TOKEN"],
              )
              resp = client.chat.completions.create(
                  model="openai/gpt-4o-mini",   # or "anthropic/claude-3-5-haiku" — same endpoint
                  messages=[{"role": "user", "content": prompt}],
                  temperature=0.3,
                  max_tokens=800,
              )
              output = resp.choices[0].message.content

          # ── Anthropic direct API ─────────────────────────────────────────────
          elif engine == "anthropic":
              import anthropic
              client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
              resp = client.messages.create(
                  model="claude-3-5-haiku-20241022",
                  max_tokens=800,
                  messages=[{"role": "user", "content": prompt}],
              )
              output = resp.content[0].text

          # ── OpenAI direct API ────────────────────────────────────────────────
          elif engine == "openai":
              from openai import OpenAI
              client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
              resp = client.chat.completions.create(
                  model="gpt-4o-mini",
                  messages=[{"role": "user", "content": prompt}],
                  temperature=0.3,
                  max_tokens=800,
              )
              output = resp.choices[0].message.content

          else:
              raise ValueError(f"Unknown engine '{engine}'. Use: github | anthropic | openai")

          print(f"=== AI OUTPUT ({engine}) ===")
          print(output)
          print("=" * 30)
          open("/tmp/ai_output.txt", "w").write(output)
          PYEOF

      # ── 7. Patch README ────────────────────────────────────────────────────
      - name: Patch README with AI output
        run: |
          python3 << 'PYEOF'
          import re

          ai_output = open("/tmp/ai_output.txt").read()
          readme    = open("README.md").read()

          # WHATS_NEW
          wn = re.search(r"<!-- WHATS_NEW_START -->(.*?)<!-- WHATS_NEW_END -->", ai_output, re.DOTALL)
          if wn:
              readme = re.sub(
                  r"<!-- WHATS_NEW_START -->.*?<!-- WHATS_NEW_END -->",
                  f"<!-- WHATS_NEW_START -->\n{wn.group(1).strip()}\n<!-- WHATS_NEW_END -->",
                  readme, flags=re.DOTALL
              )
              print("✅ WHATS_NEW updated")
          else:
              print("⚠️  WHATS_NEW block not found in AI output — skipping")

          # DATA_QUALITY — insert markers on first run if absent, then replace
          dq = re.search(r"<!-- DATA_QUALITY_START -->(.*?)<!-- DATA_QUALITY_END -->", ai_output, re.DOTALL)
          if dq:
              dq_body = dq.group(1).strip()
              if "<!-- DATA_QUALITY_START -->" not in readme:
                  readme = re.sub(
                      r"(## Data quality\n)(.*?)(\n\n## Contributing)",
                      lambda m: f"{m.group(1)}<!-- DATA_QUALITY_START -->\n{dq_body}\n<!-- DATA_QUALITY_END -->{m.group(3)}",
                      readme, flags=re.DOTALL
                  )
              else:
                  readme = re.sub(
                      r"<!-- DATA_QUALITY_START -->.*?<!-- DATA_QUALITY_END -->",
                      f"<!-- DATA_QUALITY_START -->\n{dq_body}\n<!-- DATA_QUALITY_END -->",
                      readme, flags=re.DOTALL
                  )
              print("✅ Data quality updated")
          else:
              print("⚠️  DATA_QUALITY block not found in AI output — skipping")

          open("README.md", "w").write(readme)
          print("README.md written.")
          PYEOF

      # ── 8. Commit & push ──────────────────────────────────────────────────
      - name: Commit updated README
        env:
          VERSION:      ${{ steps.version.outputs.VERSION }}
          ENGINE:       ${{ steps.engine.outputs.ENGINE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes to commit."
          else
            git commit -m "docs: auto-update README for $VERSION via $ENGINE [skip ci]"
            git push origin HEAD:master
            echo "✅ README committed and pushed."
          fi
