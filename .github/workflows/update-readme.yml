name: Update README on Release

# DISABLED 2026-04-24 — rebuilding per docs/VISION-WHATS-NEW.md (weekend work)
# Original trigger fired on v* tag pushes. Current AI prompt produces
# dev-facing summaries of git commits instead of user-facing changes.
# Manual dispatch retained so the workflow remains inspectable.
on:
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Version label (e.g. v1.2.0) — leave blank to auto-detect'
        required: false
        default: ''

permissions:
  contents: write
  models: read          # GitHub Copilot / GitHub Models — no extra secret needed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Resolve version ─────────────────────────────────────────────────
      - name: Resolve version label
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_label }}" ]; then
            VERSION="${{ github.event.inputs.version_label }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF##*/}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # ── 3. Fetch live stats ────────────────────────────────────────────────
      - name: Fetch live stats from Worker API
        id: stats
        run: |
          WORKER_URL="https://rolelens-worker.russo-antonio76.workers.dev/api/status"
          RESPONSE=$(curl -sf "$WORKER_URL" || echo '{}')
          ROLE_COUNT=$(echo "$RESPONSE"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('role_count','?'))"        2>/dev/null || echo "?")
          TASK_COUNT=$(echo "$RESPONSE"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('task_count','?'))"        2>/dev/null || echo "?")
          SHADOW_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('shadow_role_count','?'))" 2>/dev/null || echo "?")
          echo "ROLE_COUNT=$ROLE_COUNT"     >> "$GITHUB_OUTPUT"
          echo "TASK_COUNT=$TASK_COUNT"     >> "$GITHUB_OUTPUT"
          echo "SHADOW_COUNT=$SHADOW_COUNT" >> "$GITHUB_OUTPUT"
          echo "Stats → roles=$ROLE_COUNT  tasks=$TASK_COUNT  shadow=$SHADOW_COUNT"

      # ── 4. Build prompt from live context ──────────────────────────────────
      - name: Build AI prompt
        id: prompt
        env:
          VERSION:      ${{ steps.version.outputs.VERSION }}
          ROLE_COUNT:   ${{ steps.stats.outputs.ROLE_COUNT }}
          TASK_COUNT:   ${{ steps.stats.outputs.TASK_COUNT }}
          SHADOW_COUNT: ${{ steps.stats.outputs.SHADOW_COUNT }}
        run: |
          # Collect context snippets
          WORKER_SNIPPET=$(head -120 worker/src/index.ts 2>/dev/null || echo "not found")
          GIT_LOG=$(git log --oneline --no-merges -15 \
            --invert-grep --grep="\[skip ci\]" \
            --pretty=format:"- %s (%ad)" --date=short 2>/dev/null)
          README_HEAD=$(head -120 README.md)

          # Write prompt to file (avoids YAML quoting issues with multiline)
          cat > /tmp/prompt.txt << PROMPT
          You are a technical writer maintaining the README for Entra RoleLens — a zero-cost
          Cloudflare-hosted tool that maps Entra ID tasks to minimum built-in roles, detects
          shadow/unlisted roles, and keeps data fresh via a nightly passwordless OIDC pipeline.

          ## Live stats (from /api/status as of this run)
          - Roles indexed: ${ROLE_COUNT}
          - Tasks mapped:  ${TASK_COUNT}
          - Shadow (unlisted) roles: ${SHADOW_COUNT}

          ## Release
          Version: ${VERSION}
          Date: $(date -u +%Y-%m-%d)

          ## Recent commits (non-data)
          ${GIT_LOG}

          ## Worker (index.ts excerpt)
          ${WORKER_SNIPPET}

          ## README header (context)
          ${README_HEAD}

          ---

          Return exactly TWO blocks and nothing else:

          1. WHATS_NEW — 3 to 6 bullet points summarising what changed in this release,
             based on the git log. Each bullet starts with a verb. No filler.
             Wrap in:
             <!-- WHATS_NEW_START -->
             - bullet
             <!-- WHATS_NEW_END -->

          2. DATA_QUALITY — rewrite the five data-quality bullets replacing any hardcoded
             numbers with the live stats above. Keep the same structure.
             Wrap in:
             <!-- DATA_QUALITY_START -->
             - bullet
             <!-- DATA_QUALITY_END -->
          PROMPT

          echo "Prompt written ($(wc -c < /tmp/prompt.txt) bytes)"

      # ── 5. Call GitHub Copilot via actions/ai-inference ────────────────────
      - name: Generate README sections with GitHub Copilot
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini     # swap to: anthropic/claude-3-5-haiku — same token
          prompt-file: /tmp/prompt.txt

      # ── 6. Patch README ────────────────────────────────────────────────────
      - name: Patch README with Copilot output
        env:
          AI_RESPONSE: ${{ steps.ai.outputs.response }}
        run: |
          python3 << 'PYEOF'
          import re, os

          ai_output = os.environ["AI_RESPONSE"]
          readme    = open("README.md").read()

          # WHATS_NEW
          wn = re.search(r"<!-- WHATS_NEW_START -->(.*?)<!-- WHATS_NEW_END -->", ai_output, re.DOTALL)
          if wn:
              readme = re.sub(
                  r"<!-- WHATS_NEW_START -->.*?<!-- WHATS_NEW_END -->",
                  f"<!-- WHATS_NEW_START -->\n{wn.group(1).strip()}\n<!-- WHATS_NEW_END -->",
                  readme, flags=re.DOTALL
              )
              print("✅ WHATS_NEW updated")
          else:
              print("⚠️  WHATS_NEW block missing in Copilot output — skipping")

          # DATA_QUALITY — add markers on first run if absent
          dq = re.search(r"<!-- DATA_QUALITY_START -->(.*?)<!-- DATA_QUALITY_END -->", ai_output, re.DOTALL)
          if dq:
              dq_body = dq.group(1).strip()
              if "<!-- DATA_QUALITY_START -->" not in readme:
                  readme = re.sub(
                      r"(## Data quality\n)(.*?)(\n\n## Contributing)",
                      lambda m: f"{m.group(1)}<!-- DATA_QUALITY_START -->\n{dq_body}\n<!-- DATA_QUALITY_END -->{m.group(3)}",
                      readme, flags=re.DOTALL
                  )
              else:
                  readme = re.sub(
                      r"<!-- DATA_QUALITY_START -->.*?<!-- DATA_QUALITY_END -->",
                      f"<!-- DATA_QUALITY_START -->\n{dq_body}\n<!-- DATA_QUALITY_END -->",
                      readme, flags=re.DOTALL
                  )
              print("✅ Data quality updated")
          else:
              print("⚠️  DATA_QUALITY block missing in Copilot output — skipping")

          open("README.md", "w").write(readme)
          print("README.md written.")
          PYEOF

      # ── 7. Commit & push ──────────────────────────────────────────────────
      - name: Commit updated README
        env:
          VERSION:      ${{ steps.version.outputs.VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes to commit."
          else
            git commit -m "docs: auto-update README for $VERSION via GitHub Copilot [skip ci]"
            git push origin HEAD:master
            echo "✅ README committed and pushed."
          fi
