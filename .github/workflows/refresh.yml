name: Refresh role and task data

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write # MANDATORY: Allows GitHub to request the OIDC token from Entra

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true # Essential since you are only accessing Graph API

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch roles
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: python pipeline/fetch_roles.py

      - name: Scrape task-to-role mappings
        run: python pipeline/scrape_tasks.py

      - name: Diff roles
        run: python pipeline/diff_roles.py

      - name: Enrich
        run: python pipeline/enrich.py

      - name: Validate
        run: python pipeline/validate.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

      - name: Sentrux structural quality gate
        run: |
          set -e

          # Download the correct Linux binary (no -gnu suffix)
          curl -L -o sentrux https://github.com/sentrux/sentrux/releases/download/v0.5.7/sentrux-linux-x86_64
          chmod +x sentrux

          # Sanity check: real binary is ~36MB; a 9-byte file means we got a 404 page
          SIZE=$(stat -c%s sentrux)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: sentrux binary is $SIZE bytes (expected ~36MB) -- aborting Sentrux step"
            exit 1
          fi

          mkdir -p .sentrux

          # Capture stdout (where metrics live) and stderr separately
          ./sentrux gate . > .sentrux/gate_stdout.txt 2> .sentrux/gate_stderr.txt || true

          # Parse metrics into JSON and generate the dashboard SVG
          python pipeline/sentrux_parser.py
          python pipeline/sentrux_dashboard_svg.py

          if [ -f .sentrux/quality.json ]; then
            echo "Sentrux quality.json written:"
            cat .sentrux/quality.json
          fi
        continue-on-error: true

      - name: Push to Cloudflare KV and D1
        run: python pipeline/push_to_cloudflare.py
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Run pill integration tests
        id: pill_tests
        continue-on-error: true
        run: python pipeline/test_pills.py
        env:
          WORKER_URL: https://rolelens-worker.russo-antonio76.workers.dev

      - name: Synonym expansion regression check
        continue-on-error: true
        run: python pipeline/test_synonym_regression.py
        env:
          WORKER_URL: https://rolelens-worker.russo-antonio76.workers.dev

      # Only fires when test_pills.py exits 1, which now means a NEW
      # regression rather than any failure. Known failures are
      # suppressed via KNOWN_FAILURES in pipeline/test_pills.py.
      - name: Open issue on pill regression
        if: steps.pill_tests.outcome == 'failure'
        run: |
          gh issue create \
            --title "Pill regression detected in nightly run $(date +%Y-%m-%d)" \
            --body "The nightly pipeline detected that one or more documented pill queries no longer return the expected top result. Check the Actions log for the specific failures and investigate before the next deploy." \
            --label "bug,pill-regression"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push data to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ assets/quality-dashboard.svg README.md .sentrux/baseline.json
          git diff --staged --quiet || git commit -m "data: nightly refresh [skip ci]"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
