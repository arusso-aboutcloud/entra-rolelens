name: Refresh role and task data

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push data/ back to main
      issues: write         # validate.py opens an issue on failure

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      # ── Data collection ───────────────────────────────────────────────────
      - name: Fetch roles
        run: python pipeline/fetch_roles.py

      - name: Scrape task-to-role mappings
        run: python pipeline/scrape_tasks.py

      # ── Diff + enrich ─────────────────────────────────────────────────────
      - name: Diff roles (build changelog)
        run: python pipeline/diff_roles.py

      - name: Enrich (build master.json)
        run: python pipeline/enrich.py

      # ── Validate — abort pipeline on failure ──────────────────────────────
      - name: Validate master.json
        run: python pipeline/validate.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

      # ── Push to Cloudflare ────────────────────────────────────────────────
      - name: Push to Cloudflare KV and D1
        run: python pipeline/push_to_cloudflare.py
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      # ── Commit data/ back to repo ─────────────────────────────────────────
      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/roles.json \
                  data/tasks.json \
                  data/master.json \
                  data/changelog.json \
                  data/previous_roles.json
          git diff --staged --quiet \
            || git commit -m "data: nightly refresh [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
