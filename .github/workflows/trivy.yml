name: Trivy Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 0" # Weekly Sunday 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  security-events: write # For SARIF upload

jobs:
  # ── Dependency vulnerability scan (filesystem) ──
  vuln-scan:
    name: Vuln Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - worker    # Node.js (package.json + lockfile)
          - pipeline  # Python (requirements.txt)
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Trivy fs scan (${{ matrix.path }})
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.path }}
          format: sarif
          output: trivy-vuln-${{ matrix.path }}.sarif
          severity: HIGH,CRITICAL
          exit-code: 0 # Report but don't fail

      - name: Upload vuln SARIF (${{ matrix.path }})
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-vuln-${{ matrix.path }}.sarif
          category: trivy-vuln-${{ matrix.path }}

  # ── Misconfiguration scan ──
  config-scan:
    name: Config Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
          # Scan for Dockerfile, K8s, Terraform, CloudFormation misconfigs
          # wrangler.toml is also checked for misconfigurations

      - name: Upload config SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ── Security dashboard SVG (commit to repo, skip on PRs) ──
  dashboard:
    name: Security Dashboard
    runs-on: ubuntu-latest
    needs: [vuln-scan, config-scan]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .trivy directory
        run: mkdir -p .trivy

      - name: Scan worker deps (JSON)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: worker
          format: json
          output: .trivy/worker.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan pipeline deps (JSON)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: pipeline
          format: json
          output: .trivy/pipeline.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Generate security dashboard SVG
        run: python pipeline/trivy_dashboard_svg.py

      - name: Commit dashboard SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/security-dashboard.svg
          git diff --staged --quiet || git commit -m "data: update security dashboard [skip ci]"
          git pull --rebase origin master
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── SBOM generation ──
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Generate SBOM (worker)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: worker
          format: cyclonedx
          output: sbom-worker.json

      - name: Generate SBOM (pipeline)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: pipeline
          format: cyclonedx
          output: sbom-pipeline.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sboms
          path: |
            sbom-worker.json
            sbom-pipeline.json
          retention-days: 90
