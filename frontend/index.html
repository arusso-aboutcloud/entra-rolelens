<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entra RoleLens — Minimum privilege for every Entra task</title>
  <meta name="description" content="Find the minimum built-in Microsoft Entra ID role for any admin task. Free, no login, updated daily." />
  <link rel="icon" type="image/png" href="assets/logo_200x200_white.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Core Layout ─────────────────────────────────────────────── */
    :root {
      --bg: #07080D;
      --surface: #0D1018;
      --border: #1C2438;
      --accent: #00E5A3;
      --text: #E2E8F0;
      --muted: #64748B;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --max-width: 1100px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      padding: 0 24px;
      box-sizing: border-box;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header { width: 100%; padding: 40px 0; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-mono); font-size: 22px; text-decoration: none; color: var(--text); font-weight: bold; }
    .logo span { color: var(--accent); }
    .status-badge { background: var(--surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 12px; color: var(--muted); }

    /* ── Hero & Tabs ───────────────────────────────────────────────── */
    .hero { text-align: center; padding: 60px 0 40px; }
    .hero h1 { font-family: var(--font-head); font-size: clamp(2rem, 7vw, 3.5rem); line-height: 1.1; margin-bottom: 16px; }
    .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 100px; cursor: pointer; font-family: var(--font-mono); transition: 0.2s; }
    .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ── Search UI ─────────────────────────────────────────────────── */
    .search-wrap { position: relative; max-width: 700px; margin: 0 auto; }
    .search-input { width: 100%; height: 64px; background: var(--surface); border: 2px solid var(--border); border-radius: 16px; color: #fff; padding: 0 24px; font-size: 18px; transition: 0.2s; }
    .search-input:focus { border-color: var(--accent); outline: none; }

    /* ── Results Grid ──────────────────────────────────────────────── */
    #results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 40px;
      width: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: 0.2s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-task { font-weight: bold; margin-bottom: 15px; color: var(--accent); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .card-role { font-size: 18px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; }
    .card-desc { color: var(--muted); font-size: 14px; line-height: 1.5; }

    .hidden { display: none; }
    .msg { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <a href="#" class="logo">Entra<span>RoleLens</span></a>
      <div id="status" class="status-badge">Syncing...</div>
    </header>

    <main class="hero">
      <div class="tabs">
        <button class="tab-btn active" id="tab-search">Task Engine</button>
        <button class="tab-btn" id="tab-diff">Role Comparison</button>
      </div>

      <div id="search-section">
        <h1>Minimum Privilege.<br>Zero Effort.</h1>
        <div class="search-wrap">
          <input type="text" id="input-search" class="search-input" placeholder="e.g. Reset user MFA...">
        </div>
      </div>

      <div id="diff-section" class="hidden">
        <h1>Compare Roles</h1>
        <p style="color:var(--muted)">Side-by-side permission analysis coming soon.</p>
      </div>

      <div id="results-grid">
        <div class="msg">Start typing to see recommended roles...</div>
      </div>
    </main>
  </div>

  <script>
    // ── CONFIGURATION ───────────────────────────────────────────
    // Using your verified Worker URL
    const API_BASE = 'https://rolelens-worker.russo-antonio76.workers.dev';

    const inputSearch = document.getElementById('input-search');
    const resultsGrid = document.getElementById('results-grid');
    const statusBadge = document.getElementById('status');

    // ── INITIALIZATION ──────────────────────────────────────────
    async function init() {
      try {
        const resp = await fetch(`${API_BASE}/api/status`);
        const data = await resp.json();
        statusBadge.innerText = `Updated: ${new Date(data.last_updated).toLocaleDateString()}`;
      } catch (e) {
        statusBadge.innerText = "Offline";
      }
    }

    // ── SEARCH LOGIC ────────────────────────────────────────────
    let debounceTimer;
    inputSearch.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      const query = e.target.value.trim();

      if (query.length < 2) {
        resultsGrid.innerHTML = '<div class="msg">Start typing to see recommended roles...</div>';
        return;
      }

      debounceTimer = setTimeout(() => performSearch(query), 300);
    });

    async function performSearch(q) {
      resultsGrid.innerHTML = '<div class="msg">Searching Microsoft Graph & Docs...</div>';
      try {
        const resp = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}`);
        const data = await resp.json();

        if (!data || data.length === 0) {
          resultsGrid.innerHTML = '<div class="msg">No matching tasks found. Try broader terms like "User" or "Groups".</div>';
          return;
        }

        resultsGrid.innerHTML = data.map(item => `
          <div class="card">
            <div class="card-task">${item.task || 'Admin Task'}</div>
            <div class="card-role">${item.min_role || item.displayName}</div>
            <div class="card-desc">${item.description || 'Minimum built-in role required for this action.'}</div>
          </div>
        `).join('');

      } catch (e) {
        resultsGrid.innerHTML = '<div class="msg">Error: Could not connect to the advisor engine.</div>';
      }
    }

    // ── TAB TOGGLE ─────────────────────────────────────────────
    document.getElementById('tab-search').onclick = () => {
        document.getElementById('search-section').classList.remove('hidden');
        document.getElementById('diff-section').classList.add('hidden');
        document.getElementById('tab-search').classList.add('active');
        document.getElementById('tab-diff').classList.remove('active');
    };
    
    document.getElementById('tab-diff').onclick = () => {
        document.getElementById('search-section').classList.add('hidden');
        document.getElementById('diff-section').classList.remove('hidden');
        document.getElementById('tab-diff').classList.add('active');
        document.getElementById('tab-search').classList.remove('active');
        resultsGrid.innerHTML = '';
    };

    init();
  </script>
</body>
</html>
