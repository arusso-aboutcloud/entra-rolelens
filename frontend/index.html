<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entra RoleLens — Minimum privilege for every Entra task</title>
  <meta name="description" content="Find the minimum built-in Microsoft Entra ID role for any admin task. Free, no login, updated daily from Microsoft's official documentation." />
  <meta property="og:title" content="Entra RoleLens — Minimum privilege for every Entra task" />
  <meta property="og:description" content="Type any Entra admin task, get the minimum built-in role. Role diff, 130 roles, 211 tasks. Free community tool by aboutcloud.io" />
  <meta property="og:url" content="https://entrarolelens.aboutcloud.io" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="assets/logo_200x200_white.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07080D;
      --surface:   #0D1018;
      --surface2:  #111620;
      --border:    #1C2438;
      --accent:    #00E5A3;
      --accent-dim:#007A57;
      --text:      #E2E8F0;
      --muted:     #64748B;
      --warn:      #FBBF24;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --radius-lg: 16px;
      --max-width: 1100px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centers everything */
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1C2438 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.3;
      z-index: 0;
    }

    /* ── Layout Containers ─────────────────────────────────────────── */
    .app-wrapper {
      width: 100%;
      max-width: var(--max-width);
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header { width: 100%; padding: 40px 0 20px; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-mono); font-size: 24px; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    .logo .entra-part { color: #0078D4; }

    /* ── Hero ───────────────────────────────────────────────────────── */
    .hero { text-align: center; padding: 80px 0 40px; }
    .hero h1 { 
        font-family: var(--font-head); 
        font-size: clamp(2.5rem, 8vw, 4.2rem); 
        line-height: 1.1; 
        margin-bottom: 24px; 
    }
    .hero p { color: var(--muted); font-size: 18px; margin-bottom: 40px; }

    /* ── Search ─────────────────────────────────────────────────────── */
    .search-container {
        max-width: 800px;
        margin: 0 auto 40px;
        position: relative;
    }
    .search-input {
        width: 100%;
        height: 72px;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: var(--radius-lg);
        color: var(--text);
        font-size: 20px;
        padding: 0 60px 0 24px;
        transition: 0.2s;
    }
    .search-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 20px rgba(0, 229, 163, 0.1); }

    /* ── Results Grid ──────────────────────────────────────────────── */
    #search-results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    @media (max-width: 600px) {
        #search-results { grid-template-columns: 1fr; }
        .hero { padding: 40px 0; }
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s, border-color 0.2s;
    }
    .result-card:hover { transform: translateY(-4px); border-color: var(--accent-dim); }

    .card-task { font-size: 18px; font-weight: 600; margin-bottom: 20px; min-height: 54px; }
    .role-pill {
      display: inline-block;
      background: var(--accent);
      color: #000;
      padding: 6px 16px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 13px;
    }

    /* ── Tabs ──────────────────────────────────────────────────────── */
    .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; }
    .tab-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 10px 24px;
        border-radius: 100px;
        cursor: pointer;
        font-family: var(--font-mono);
    }
    .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* Utility */
    .hidden { display: none !important; }
    .state-msg { text-align: center; grid-column: 1 / -1; padding: 60px; color: var(--muted); }
  </style>
</head>
<body>

<div class="app-wrapper">
  <header>
    <div class="header-inner">
      <a href="/" class="logo"><span class="entra-part">Entra</span> <span>RoleLens</span></a>
      <div class="last-updated" id="last-updated-badge">Loading…</div>
    </div>
  </header>

  <main>
    <section class="hero">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('search')">Task Engine</button>
            <button class="tab-btn" onclick="switchMode('diff')">Role Comparison</button>
        </div>

        <div id="mode-search" class="mode active">
            <h1>The Right Role.<br>Right Now.</h1>
            <p>Describe any Entra task to find the minimum privilege role required.</p>
            
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="e.g. Reset user MFA or manage app registrations...">
            </div>

            <div class="example-pills" id="example-pills" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                <button style="background:none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; cursor: pointer;" onclick="runPillSearch('reset user MFA')">reset user MFA</button>
                <button style="background:none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; cursor: pointer;" onclick="runPillSearch('read audit logs')">read audit logs</button>
                <button style="background:none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; cursor: pointer;" onclick="runPillSearch('manage groups')">manage groups</button>
            </div>
        </div>

        <div id="mode-diff" class="mode hidden">
            <h1>Role Permission Diff</h1>
            <p>Compare two Entra ID roles side-by-side to see unique and shared permissions.</p>
            </div>
    </section>

    <div id="search-results">
        </div>
  </main>
</div>

<script>
  const API = 'https://rolelens-worker.russo-antonio76.workers.dev';
  
  function switchMode(mode) {
    document.querySelectorAll('.mode').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('mode-' + mode).classList.remove('hidden');
    event.target.classList.add('active');
  }

  async function loadStatus() {
    try {
      const res = await fetch(API + '/api/status');
      const d = await res.json();
      document.getElementById('last-updated-badge').textContent = `Updated: ${new Date(d.last_updated).toLocaleDateString()}`;
    } catch (e) { console.error(e); }
  }

  let searchTimer = null;
  document.getElementById('search-input').addEventListener('input', function(e) {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (q.length < 2) {
        document.getElementById('search-results').innerHTML = '';
        return;
    }
    searchTimer = setTimeout(() => doSearch(q), 300);
  });

  async function doSearch(q) {
    const grid = document.getElementById('search-results');
    grid.innerHTML = '<div class="state-msg">Searching Microsoft Graph & Docs...</div>';
    
    try {
      const res = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
      const results = await res.json();
      
      if (!results.length) {
        grid.innerHTML = '<div class="state-msg">No results found for that task.</div>';
        return;
      }

      grid.innerHTML = results.map(r => `
        <div class="result-card">
          <div class="card-task">${r.task}</div>
          <div>
            <span class="role-pill">${r.min_role}</span>
            <div style="margin-top: 12px; font-size: 12px; color: var(--muted)">Source: Microsoft Learn</div>
          </div>
        </div>
      `).join('');
    } catch (err) {
      grid.innerHTML = '<div class="state-msg">Error connecting to the RoleLens API.</div>';
    }
  }

  function runPillSearch(val) {
    const input = document.getElementById('search-input');
    input.value = val;
    doSearch(val);
  }

  loadStatus();
</script>
</body>
</html>
