  <text x="410" y="215" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">fetch_roles.py</text>
  <text x="410" y="235" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">diff_roles.py</text>
  <text x="410" y="255" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="middle">push_to_cloudflare.py</text>

