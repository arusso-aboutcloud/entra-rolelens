<svg width="800" height="420" viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" rx="10" fill="#0F172A"/>
  
  <rect x="30" y="40" width="180" height="60" rx="5" fill="#1E293B" stroke="#38BDF8"/>
  <text x="120" y="75" fill="white" font-family="sans-serif" font-size="12" text-anchor="middle">Microsoft Graph API</text>
  
