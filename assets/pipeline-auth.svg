<svg width="100%" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes flow1{to{stroke-dashoffset:-28}}
    @keyframes flow2{to{stroke-dashoffset:-22}}
    @keyframes flow3{to{stroke-dashoffset:-18}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .fl1{stroke-dasharray:7 7;animation:flow1 1.2s linear infinite}
    .fl2{stroke-dasharray:6 6;animation:flow2 1.8s linear infinite}
    .fl3{stroke-dasharray:5 5;animation:flow3 2.4s linear infinite}
    .dot{animation:pulse 2s ease-in-out infinite}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .sans{font-family:-apple-system,BlinkMacSystemFont,sans-serif}
    .bold{font-weight:700}
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.9" fill="#444441" opacity="0.4"/>
  </pattern>
</defs>

<rect width="1200" height="820" fill="#0D1018"/>
<rect width="1200" height="820" fill="url(#dots)"/>

